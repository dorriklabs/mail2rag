volumes:
  mail2rag_archive:
  qdrant_data:
  bm25_data:

networks:
  rag_net:
    driver: bridge

services:
  # 1. QDRANT (Vector Database)
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: qdrant
    ports:
      - "9110:6333"
      - "9111:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rag_net

  # 3. TIKA (Document Text Extraction)
  tika:
    image: apache/tika:2.9.2.0-full # Avec Tesseract OCR
    container_name: mail2rag-tika
    ports:
      - "9120:9998"
    command: [ "-h", "0.0.0.0" ]
    restart: unless-stopped
    networks:
      - rag_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9998/tika > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 2. RAG PROXY (FastAPI + Qdrant + BM25 + LM Studio)
  rag_proxy:
    build:
      context: ./ragproxy
      dockerfile: Dockerfile
    image: mail2rag-rag_proxy:latest
    container_name: rag_proxy
    env_file:
      - ./.env
    environment:
      TZ: Europe/Paris

      # LM Studio sur la machine hôte
      LM_STUDIO_URL: "http://host.docker.internal:1234"

      # Modèle d'embedding (doit correspondre à celui chargé dans LM Studio)
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-bge-m3}

      # Accès à Qdrant dans le réseau Docker
      VECTOR_DB_HOST: "qdrant"
      VECTOR_DB_PORT: "6333"
      VECTOR_DB_COLLECTION: "default-workspace"

      # BM25 index (optionnel)
      BM25_INDEX: "/bm25/bm25.pkl"
      USE_BM25: "true"

      REQUEST_TIMEOUT: "20"
      LOG_PATH: "/var/log/mail2rag/rag_proxy.log"
    volumes:
      - bm25_data:/bm25
      - mail2rag_archive:/archive
      - ./scripts:/app/scripts:ro
      - ./state:/app/state
      - ./logs:/var/log/mail2rag
    ports:
      - "9100:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/openapi.json\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - rag_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 3. MAIL2RAG (Application Python par défaut)
  mail2rag:
    build:
      context: ./mail2rag
      dockerfile: Dockerfile
    container_name: mail2rag
    env_file:
      - ./.env
    environment:
      TZ: Europe/Paris
    volumes:
      # Code source (dev hot-reload)
      - ./mail2rag:/app
      # Routing configuration
      - ./routing.json:/etc/mail2rag/routing.json:ro
      # Workspaces configuration
      - ./workspaces_config.json:/etc/mail2rag/workspaces_config.json:ro
      # Prompts directory
      - ./mail2rag/prompts:/etc/mail2rag/prompts:ro
      # Logs
      - ./logs:/var/log/mail2rag
      # State
      - ./state:/var/lib/mail2rag
      # Archive (volume nommé)
      - mail2rag_archive:/var/lib/mail2rag/mail2rag_archive
    depends_on:
      qdrant:
        condition: service_healthy
      tika:
        condition: service_healthy
      rag_proxy:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - rag_net

  # 4. STREAMLIT ADMIN (Dashboard)
  streamlit_admin:
    build: ./streamlit_admin
    container_name: streamlit_admin
    ports:
      - "9101:8501"
    volumes:
      # Code source (dev hot-reload)
      - ./streamlit_admin:/app
      # Accès à l'archive pour suppression de dossiers
      - mail2rag_archive:/archive
      # Etat persistant pour les utilisateurs
      - ./state:/state
      # Configuration du routage dynamique
      - ./routing.json:/etc/mail2rag/routing.json
      # Configuration des workspaces (prompts custom)
      - ./workspaces_config.json:/etc/mail2rag/workspaces_config.json
      # Logs unifiés
      - ./logs:/var/log/mail2rag
    environment:
      - RAG_PROXY_URL=http://rag_proxy:8000
      - QDRANT_URL=http://qdrant:6333
      - TIKA_URL=http://tika:9998
      - LM_STUDIO_URL=http://host.docker.internal:1234
      - ARCHIVE_PATH=/archive
      - ARCHIVE_BASE_URL=${ARCHIVE_BASE_URL:-http://localhost:9102}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_me_securely}
      - COOKIE_KEY=${COOKIE_KEY:-some_random_secret_string}
      - LOG_PATH=/var/log/mail2rag/admin.log
    depends_on:
      rag_proxy:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - rag_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 5. ARCHIVE SERVER (NGINX)
  archive_server:
    image: nginx:1.25-alpine
    container_name: mail2rag_archive_server
    ports:
      - "9102:80"
    volumes:
      # Custom Nginx configuration
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Archive en lecture seule
      - mail2rag_archive:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - rag_net
