volumes:
  mail2rag_archive:
  qdrant_data:
  bm25_data:

networks:
  rag_net:
    driver: bridge

services:
  # 1. QDRANT (Vector Database)
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: qdrant
    ports:
      - "9110:6333"
      - "9111:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rag_net

  # 2. TIKA (Document Text Extraction)
  tika:
    image: apache/tika:2.9.2.0-full
    container_name: mail2rag-tika
    ports:
      - "9120:9998"
    command: [ "-h", "0.0.0.0" ]
    restart: unless-stopped
    networks:
      - rag_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9998/tika > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 3. RAG PROXY (FastAPI + Qdrant + BM25 + LM Studio)
  rag_proxy:
    build:
      context: ./ragproxy
      dockerfile: Dockerfile
    image: mail2rag-rag_proxy:latest
    container_name: rag_proxy
    env_file:
      - ./.env
    environment:
      TZ: Europe/Paris

      STATE_PATH: /app/state/state.json
      ARCHIVE_PATH: /archive

      HF_HOME: /models/huggingface
      HF_HUB_CACHE: /models/huggingface/hub
      SENTENCE_TRANSFORMERS_HOME: /models/sentence-transformers
      FASTEMBED_CACHE_PATH: /models/fastembed

      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://host.docker.internal:1234}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-bge-m3}
      EMBEDDING_MODEL_PREF: ${EMBEDDING_MODEL_PREF:-text-embedding-bge-m3}

      VECTOR_DB_HOST: qdrant
      VECTOR_DB_PORT: "6333"
      VECTOR_DB_COLLECTION: ${VECTOR_DB_COLLECTION:-documents}
      MULTI_COLLECTION_MODE: ${MULTI_COLLECTION_MODE:-true}

      BM25_INDEX: /bm25/bm25.pkl
      USE_BM25: ${USE_BM25:-true}
      AUTO_REBUILD_BM25: ${AUTO_REBUILD_BM25:-true}

      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-20}
      LOG_PATH: /var/log/mail2rag/rag_proxy.log
    volumes:
      - bm25_data:/bm25
      - mail2rag_archive:/archive
      - ./model_cache:/models
      - ./scripts:/app/scripts:ro
      - ./state:/app/state
      - ./logs:/var/log/mail2rag
    ports:
      - "9100:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/openapi.json\")' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - rag_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 4. MAIL2RAG (Application Python principale)
  mail2rag:
    build:
      context: ./mail2rag
      dockerfile: Dockerfile
    container_name: mail2rag
    env_file:
      - ./.env
    environment:
      TZ: Europe/Paris

      STATE_PATH: /var/lib/mail2rag/state.json
      ARCHIVE_PATH: /var/lib/mail2rag/mail2rag_archive
      ROUTING_PATH: /etc/mail2rag/routing.json
      PROMPTS_DIR: /etc/mail2rag/prompts

      RAG_PROXY_URL: http://rag_proxy:8000
      TIKA_SERVER_URL: http://tika:9998
      ARCHIVE_BASE_URL: ${ARCHIVE_BASE_URL:-http://localhost:9102}
    volumes:
      - ./mail2rag:/app

      - ./routing.json:/etc/mail2rag/routing.json:ro
      - ./workspaces_config.json:/etc/mail2rag/workspaces_config.json:ro
      - ./mail2rag/prompts:/etc/mail2rag/prompts:ro

      - ./logs:/var/log/mail2rag
      - ./state:/var/lib/mail2rag
      - mail2rag_archive:/var/lib/mail2rag/mail2rag_archive
    depends_on:
      qdrant:
        condition: service_healthy
      tika:
        condition: service_healthy
      rag_proxy:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - rag_net

  # 5. STREAMLIT ADMIN (Dashboard)
  streamlit_admin:
    build:
      context: ./streamlit_admin
      dockerfile: Dockerfile
    container_name: streamlit_admin
    env_file:
      - ./.env
    ports:
      - "9101:8501"
    volumes:
      - ./streamlit_admin:/app

      - mail2rag_archive:/archive
      - ./state:/state

      - ./routing.json:/etc/mail2rag/routing.json
      - ./workspaces_config.json:/etc/mail2rag/workspaces_config.json

      - ./logs:/var/log/mail2rag
    environment:
      TZ: Europe/Paris

      RAG_PROXY_URL: http://rag_proxy:8000
      QDRANT_URL: http://qdrant:6333
      TIKA_URL: http://tika:9998
      LM_STUDIO_URL: ${LM_STUDIO_URL:-http://host.docker.internal:1234}

      ARCHIVE_PATH: /archive
      STATE_PATH: /state/state.json
      LOG_PATH: /var/log/mail2rag/admin.log

      ARCHIVE_BASE_URL: ${ARCHIVE_BASE_URL:-http://localhost:9102}

      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_securely}
      COOKIE_KEY: ${COOKIE_KEY:-some_random_secret_string}
    depends_on:
      rag_proxy:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - rag_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # 6. ARCHIVE SERVER (NGINX)
  archive_server:
    image: nginx:1.25-alpine
    container_name: mail2rag_archive_server
    ports:
      - "9102:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - mail2rag_archive:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - rag_net
